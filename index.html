<!doctype html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Urdu Font Writer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="card hero">
      <h1>Urdu Font Writer</h1>
      <p>Type anything in Urdu and preview it instantly in your font.</p>
    </section>

    <section class="card">
      <label for="textInput">Your text</label>
      <textarea id="textInput" placeholder="یہاں اردو میں لکھیں...">السلام علیکم</textarea>

      <div class="controls">
        <button id="copyBtn">Copy text</button>
        <button id="clearBtn" class="secondary">Clear</button>
      </div>
    </section>

    <section class="card">
      <label>Live preview</label>
      <div id="preview" class="preview">السلام علیکم</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
